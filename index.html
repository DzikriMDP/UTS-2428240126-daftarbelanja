<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Belanja</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h2 class="text-center bg-primary text-white p-3 rounded">
        Daftar Belanja
      </h2>
      Nama
      <input
        type="text"
        class="form-control mb-3"
        placeholder="Masukkan nama barang"
      />
      Jumlah
      <input
        type="number"
        class="form-control mb-3"
        placeholder="Masukkan jumlah barang"
      />
      Keterangan
      <input
        type="text"
        class="form-control mb-3"
        placeholder="Masukkan keterangan"
      />
      <button class="btn btn-primary" onclick="simpan()">Tambah Barang</button>

      <div id="list-barang" class="row"></div>
      <div class="container mt-4">

        <div class="row">
          <!-- Di HP: full width (12), Tablet: setengah (6), Desktop: seperempat (3) -->
          <div class="col-12 col-md-6 col-lg-3">
            <div
              style="
                background: #d1e7dd;
                padding: 15px;
                border: 1px solid #a3cfbb;
                margin-bottom: 10px;
              "
            >
              Card 1
            </div>
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <div
              style="
                background: #d1e7dd;
                padding: 15px;
                border: 1px solid #a3cfbb;
                margin-bottom: 10px;
              "
            >
              Card 2
            </div>
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <div
              style="
                background: #d1e7dd;
                padding: 15px;
                border: 1px solid #a3cfbb;
                margin-bottom: 10px;
              "
            >
              Card 3
            </div>
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <div
              style="
                background: #d1e7dd;
                padding: 15px;
                border: 1px solid #a3cfbb;
                margin-bottom: 10px;
              "
            >
              Card 4
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
